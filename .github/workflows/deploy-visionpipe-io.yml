name: Deploy to visionpipe.github.io

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Initial Push to visionpipe.github.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo A
        uses: actions/checkout@v4

      - name: Force Sync to Empty Repo B
        env:
          GH_PAGES_TOKEN: ${{ secrets.VISIONPIPE_PAGES_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          cd docs

          git init
          git checkout -b main
          git add .
          git commit -m "Initial deploy from ${{ github.repository }}"

          git remote add origin https://x-access-token:${GH_PAGES_TOKEN}@github.com/visionpipe/visionpipe.github.io.git
          git push -u origin main --force
